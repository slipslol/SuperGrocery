<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SuperGrocery</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
<div class="app" id="app">

  <!-- ── BUILD HEADER ──────────────────────────────────────── -->
  <header class="app-bar" id="barBuild">
    <div class="bar-logo">
      <svg viewBox="0 0 24 24"><path d="M19 7h-3V6a4 4 0 0 0-8 0v1H5a1 1 0 0 0-1 1v11a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V8a1 1 0 0 0-1-1zm-9-1a2 2 0 0 1 4 0v1h-4V6zm8 13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V9h2v1a1 1 0 0 0 2 0V9h4v1a1 1 0 0 0 2 0V9h2v10z"/></svg>
      <span>SuperGrocery</span>
    </div>
    <button class="bar-clear-all hidden" id="clearAllBtn">Clear all</button>
  </header>

  <!-- ── REVIEW HEADER ─────────────────────────────────────── -->
  <header class="app-bar review-bar hidden" id="barReview">
    <button class="bar-back" id="exitReview">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <span class="bar-review-title" id="reviewTitle">Your List</span>
    <button class="bar-start-shop" id="startShopBtn">Start Shopping</button>
  </header>

  <!-- ── SHOP HEADER ───────────────────────────────────────── -->
  <header class="app-bar shop-bar hidden" id="barShop">
    <button class="bar-back" id="exitShop">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="bar-shop-center">
      <div class="bar-progress-wrap">
        <div class="bar-progress-track">
          <div class="bar-progress-fill" id="progressFill"></div>
        </div>
        <span class="bar-progress-text" id="progressText">0 / 0</span>
      </div>
    </div>
    <button class="bar-finish" id="finishBtn">Finish</button>
  </header>

  <!-- ══ BUILD MODE ════════════════════════════════════════════ -->
  <div class="mode active" id="buildMode">
    <div class="search-row">
      <div class="search-box">
        <svg class="ic-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="search" id="searchInput" placeholder="Search items…" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="search-clear hidden" id="searchClear" aria-label="Clear">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>
    <div class="cat-pills" id="catPills">
      <button class="cpill active" data-cat="all">All</button>
      <button class="cpill" data-cat="Produce">🥦 Produce</button>
      <button class="cpill" data-cat="Dairy">🥛 Dairy</button>
      <button class="cpill" data-cat="Meat">🥩 Meat</button>
      <button class="cpill" data-cat="Bakery">🍞 Bakery</button>
      <button class="cpill" data-cat="Pantry">🥫 Pantry</button>
      <button class="cpill" data-cat="Frozen">🧊 Frozen</button>
      <button class="cpill" data-cat="Beverages">🥤 Beverages</button>
      <button class="cpill" data-cat="Other">📦 Other</button>
    </div>
    <div class="scroll-area" id="browseList"></div>

    <!-- Floating CTA -->
    <div class="cta-float" id="ctaFloat">
      <button class="cta-btn" id="readyBtn">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L5.53 12.7a1 1 0 0 0-1.41 1.41l4.18 4.18c.39.39 1.02.39 1.41 0L20.29 7.71a1 1 0 0 0-1.41-1.41L9 16.17z"/></svg>
        Review List
        <span class="cta-count" id="ctaCount">0 items</span>
      </button>
    </div>
  </div>

  <!-- ══ REVIEW MODE ════════════════════════════════════════════ -->
  <div class="mode slide-right" id="reviewMode">

    <!-- Kroger store picker (shown when no location set) -->
    <div class="kroger-banner hidden" id="krogerBanner">
      <div class="kroger-banner-head">
        <span class="kroger-banner-icon">🏪</span>
        <div class="kroger-banner-text">
          <strong>Set your Kroger store for pricing</strong>
          <span>Enter your zip code to find nearby stores</span>
        </div>
      </div>
      <div class="kroger-zip-row">
        <input type="text" id="krogerZipInput" placeholder="Zip code" maxlength="5" inputmode="numeric" pattern="[0-9]*">
        <button class="kroger-zip-btn" id="krogerZipBtn">Find</button>
      </div>
      <div class="kroger-stores hidden" id="krogerStores"></div>
    </div>

    <div class="scroll-area review-scroll" id="reviewList"></div>
    <div class="total-bar" id="reviewTotalBar">
      <div class="total-label">
        Estimated total
        <span class="total-est-note">via Kroger</span>
      </div>
      <span class="total-amount" id="reviewTotalAmt">—</span>
    </div>
  </div>

  <!-- ══ SHOP MODE ══════════════════════════════════════════════ -->
  <div class="mode slide-right" id="shopMode">
    <div class="scroll-area shop-scroll" id="shopList"></div>
    <div class="total-bar" id="shopTotalBar">
      <div class="total-label">
        Estimated total
        <span class="total-est-note">via Kroger</span>
      </div>
      <span class="total-amount" id="shopTotalAmt">—</span>
    </div>
  </div>

  <!-- ══ DONE MODE ══════════════════════════════════════════════ -->
  <div class="mode slide-right" id="doneMode">
    <div class="done-screen">
      <div class="done-icon" id="doneIcon">🛒</div>
      <h2 class="done-title">All Done!</h2>
      <p class="done-sub" id="doneSub">You picked up all your items</p>
      <div class="done-actions">
        <button class="done-btn primary" id="btnNewList">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Start New List
        </button>
        <button class="done-btn secondary" id="btnShopAgain">
          <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          Shop Same List Again
        </button>
      </div>
    </div>
  </div>

</div>

<!-- ── Edit sheet ──────────────────────────────────────────── -->
<div class="overlay" id="editOverlay"></div>
<div class="sheet" id="editSheet">
  <div class="sheet-handle"></div>
  <h2 class="sheet-title">Edit Item</h2>
  <form id="editForm" autocomplete="off">
    <input type="hidden" id="editId">
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label>Item name</label>
        <input type="text" id="editName" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label>Qty</label>
        <input type="text" id="editQty" placeholder="1">
      </div>
      <div class="form-group" style="flex:1">
        <label>Unit</label>
        <input type="text" id="editUnit" placeholder="lb, pkg…">
      </div>
      <div class="form-group" style="flex:2">
        <label>Category</label>
        <select id="editCat">
          <option value="Produce">Produce</option>
          <option value="Dairy">Dairy</option>
          <option value="Meat">Meat</option>
          <option value="Bakery">Bakery</option>
          <option value="Pantry" selected>Pantry</option>
          <option value="Frozen">Frozen</option>
          <option value="Beverages">Beverages</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label>Notes</label>
        <input type="text" id="editNotes" placeholder="Brand, size, preference…">
      </div>
    </div>
    <button type="submit" class="btn-submit">Save</button>
  </form>
</div>

<div class="toast" id="toast"></div>
<script>window.HA_BASE = '__HA_BASE__';</script>
<script src="static/app.js"></script>
</body>
</html>
